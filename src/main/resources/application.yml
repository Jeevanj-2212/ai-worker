spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ai-worker-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  datasource:
    url: jdbc:postgresql://localhost:5432/sentiment_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    # This tells Hibernate to automatically create/update your tables based on your Java entities
    hibernate:
      ddl-auto: update

    # This prints the SQL queries to your console ( helpful for debugging )
    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true